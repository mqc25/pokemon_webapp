services:
  # 1. The Database (PostgreSQL + PostGIS for spatial queries)
  db:
    image: postgis/postgis:14-3.3
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. The Backend (Django)
  backend:
    build: ./backend
    # Force the use of the ASGI server on port 8000
    command: daphne -b 0.0.0.0 -p 8000 core.asgi:application
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
    depends_on:
      - db

  # 3. The Frontend (React)
  frontend:
    build: ./frontend
    # This command starts the React dev server
    command: npm start
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - WDS_SOCKET_PORT=0 # Prevents common React hot-reload bugs in Docker

  # 4. The Gateway (Nginx)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/nginx/certs
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data: # Persists your database data even if containers are destroyed